<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navify • Contact Support</title>
  <link rel="stylesheet" href="CSS%20KO%20ITO%20SA%20APP.css" />
</head>
<body>
  <main class="app-shell">
    <section class="app-card">
      <header class="topbar">
        <div class="brand-wrap">
          <div class="brand-title">NAVIFY</div>
          <div class="brand-sub">Support Center</div>
        </div>
      </header>

      <section class="glass-panel">
        <div class="panel-title">Need Help?</div>
        <div class="panel-sub">Use the support contacts below if you need assistance using the app.</div>

        <div class="contact-list">
          <div class="contact-item">
            <div class="contact-name">Support Email</div>
            <div class="contact-meta">mattymiah10@gmail.com</div>
          </div>

          <div class="contact-item">
            <div class="contact-name">Support Phone</div>
            <div class="contact-meta">09766299248</div>
          </div>
        </div>

        <div class="action-grid">
          <button class="primary-btn" type="button" onclick="window.location.href='mailto:mattymiah10@gmail.com?subject=Navify Support'">
            Email Support
          </button>
          <button class="primary-btn" type="button" onclick="window.location.href='tel:09766299248'">
            Call Support
          </button>
          <button class="secondary-btn" type="button" onclick="window.location.href='home.html'">
            Back to Home
          </button>
        </div>
      </section>
    </section>
  </main>

  <script src="theme.js"></script>
</body>
</html>
