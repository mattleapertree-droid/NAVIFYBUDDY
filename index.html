<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Navify - Your Travel Buddy</title>
  <link rel="stylesheet" href="css/app.css" />
  <style>
    .auth-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
    }
    
    .auth-card {
      width: min(500px, 100%);
      background: linear-gradient(180deg, rgba(10, 26, 54, 0.98), rgba(6, 18, 38, 0.98));
      border: 1px solid rgba(123, 241, 255, 0.18);
      border-radius: 26px;
      padding: 40px;
      text-align: center;
    }
    
    .auth-logo {
      font-size: 56px;
      font-weight: 900;
      color: var(--cyan);
      margin-bottom: 12px;
      text-shadow: 0 0 18px rgba(123, 241, 255, 0.45);
    }
    
    .auth-tagline {
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 36px;
    }
    
    .button.guest {
      margin-top: 12px;
      width: 100%;
    }
  </style>
</head>
<body>
  <main class="scene" aria-label="Navify Login">
    <div class="glass-ring" aria-hidden="true"></div>
    <span class="glow-line" aria-hidden="true"></span>
    <span class="glow-line bottom" aria-hidden="true"></span>

    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">NAVIFY</div>
        <div class="auth-tagline">Your Travel Buddy</div>

        <div style="margin-bottom: 20px;">
          <p class="panel-sub">Welcome to Navify. Sign in to your account or continue as a guest.</p>
        </div>

        <div class="cta" aria-label="Authentication">
          <button class="button" id="signInBtn">Sign In</button>
          <button class="button secondary" id="signUpBtn">Sign Up</button>
          <button class="button guest secondary" id="guestBtn">Continue as Guest</button>
        </div>

        <div class="toggle" style="margin-top: 24px; cursor: pointer; font-size: 14px;">White Mode</div>
      </div>
    </div>

    <div id="authModals" aria-hidden="true">
      <!-- Sign In Modal -->
      <div class="modal" id="signInModal" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-label="Sign in options">
          <div class="modal-title">Sign In</div>
          <div id="signInError" style="color: var(--danger); font-size: 12px; margin-bottom: 12px; display: none;"></div>
          <div class="form">
            <input class="input" type="email" id="signInEmail" placeholder="Email" />
            <input class="input" type="password" id="signInPassword" placeholder="Password" />
            <label style="display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; margin-top: 12px; cursor: pointer;">
              <input type="checkbox" id="rememberMeCheckbox" style="cursor: pointer;" />
              Remember me on this device
            </label>
          </div>
          <button class="button" id="enterAppBtn">Enter App</button>
          <button class="modal-close" data-close="#signInModal">Close</button>
        </div>
      </div>

      <!-- Sign Up Modal -->
      <div class="modal" id="signUpModal" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-label="Create account" style="border: 2px solid rgba(123, 241, 255, 0.3); box-shadow: 0 0 30px rgba(123, 241, 255, 0.2), inset 0 0 30px rgba(123, 241, 255, 0.05);">
          <div class="modal-title" style="background: linear-gradient(135deg, var(--cyan), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 20px;">Create Account</div>
          <div id="signUpError" style="color: var(--danger); font-size: 12px; margin-bottom: 12px; display: none;"></div>
          <div class="form">
            <input class="input" type="text" id="signUpName" placeholder="Full Name" />
            <input class="input" type="email" id="signUpEmail" placeholder="Email" />
            <input class="input" type="password" id="signUpPassword" placeholder="Password (min 8 chars)" />
            <input class="input" type="password" id="signUpConfirm" placeholder="Confirm Password" />
            <label style="display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 12px; margin-top: 16px; cursor: pointer;">
              <input type="checkbox" id="signUpTerms" style="cursor: pointer;" />
              I agree to Terms & Privacy Policy
            </label>
          </div>
          <button class="button" id="createAccountBtn" style="margin-top: 20px; background: linear-gradient(135deg, var(--cyan), var(--blue));">Quick Sign Up</button>
          <button class="modal-close" data-close="#signUpModal">Close</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/theme.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="auth/firebase-init.js"></script>
  <script src="auth/reset-local.js"></script>
  <script src="auth/firebase-auth.js"></script>
  <script src="auth/modal-core.js"></script>
  <script src="auth/sms-otp.js"></script>
  <script src="auth/sign-in.js"></script>
  <script src="auth/sign-up.js"></script>
  <script>
    // Check Firebase initialization status
    let firebaseReady = false;
    const maxWaitTime = 5000; // 5 seconds
    const checkInterval = setInterval(() => {
      if (window.navifyAuth && window.navifyDb) {
        firebaseReady = true;
        console.log('✓ Firebase is ready for authentication');
        clearInterval(checkInterval);
      }
    }, 100);
    
    // Stop waiting after 5 seconds and log error
    setTimeout(() => {
      if (!firebaseReady) {
        console.error('❌ Firebase initialization timeout - Auth might not work');
      }
      clearInterval(checkInterval);
    }, maxWaitTime);

    // Guest access button - limited features only
    document.getElementById('guestBtn')?.addEventListener('click', () => {
      const confirmGuest = confirm(
        'Guest Mode has limited features.\n\n' +
        'To unlock full features like:\n' +
        '- Real-time location sharing\n' +
        '- Nearby friend detection\n' +
        '- Voice calling\n' +
        '- Saved places\n\n' +
        'Please sign up for a free account!\n\n' +
        'Continue as guest anyway?'
      );

      if (confirmGuest) {
        localStorage.setItem('navify-user', JSON.stringify({
          uid: 'guest_' + Date.now(),
          email: null,
          name: 'Guest',
          photoURL: null,
          isGuest: true
        }));
        window.location.href = 'pages/home.html';
      }
    });

    // Note: Removed auto-redirect on page load to allow users to see login/signup page
    // Users can manually navigate to home.html or will be redirected after signing in/up
  </script>
</body>
</html>
